<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #333;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        table {
            border: 2px solid #333;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h2>Styled Table with Background and Border</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Occupation</th>
        </tr>
        <tr>
            <td>Emmanuel</td>
            <td>25</td>
            <td>Programmer</td>
        </tr>
        <tr>
            <td>John</td>
            <td>30</td>
            <td>Designer</td>
        </tr>
        <tr>
            <td>Sarah</td>
            <td>28</td>
            <td>Developer</td>
        </tr>
    </table>
</body>
</html>
